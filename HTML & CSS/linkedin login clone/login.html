<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>
<body>
   <header>
    
    <img src="linkedinlogo.jpg" alt="" class="img-logo">
    <div class="nav">
        <table>
            <tr>
                <td style="width:90px" ><i class="fa fa-rocket" aria-hidden="true"></i><br>Top Content</td>
                <td><i class="fa fa-user-group" aria-hidden="true"></i><br>People</td>
                <td><i class="fas fa-atlas" aria-hidden="true"></i><br>Learning</td>
                <td><i class="fa fa-briefcase" aria-hidden="true"></i><br>Jobs</td>
                <td><i class="fa fa-puzzle-piece" aria-hidden="true"></i><br>Games</td>
                <td style="border-left:1px solid grey;border-right:1px solid grey;width:80px"><i class="fa fa-laptop"></i><br>Get the app</td>
                <td ><button class="btn-sign">Sign in</button></td>
                <td><button class="btn-join">Join now</button></td>
               
            </tr>
            
            
        </table>
    </div>
   
   </header> 
   <div class="container1">
    <p class="head">Welcome to your <br> professional network</p>
    <button class="btn-google"><img src="googlelogo.png" alt="googlelogo" class="img-goo">&nbsp;&nbsp;Continue with Google</button><br><br>
    <button class="btn-microsoft"><img src="microsoftlogo.png" alt="" class="img-micro">&nbsp;&nbsp;Continue with Microsoft</button><br><br>
    <button class="btn-email">Sign in with email</button>
    <p class="p-click">By clicking Continue to join or sign in, you agree to LinkedIn’s <font color="blue"><b>User </b><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<b>Agreement, Privacy Policy,</b></font> and <font color="blue"><b>Cookie Policy</font>.</p>
    
    <br><span class="myh4">New to LinkedIn?<font color="blue" ><b>Join now</b></font></span>
   </div>
   <div class="container2">
    <img src="linkedbg.svg" alt="" class="img-bg">
   </div>
</body>
</html>
