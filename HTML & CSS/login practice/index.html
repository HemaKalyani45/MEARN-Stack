<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    
    <table  height="300px" width="350px" align="center" >
    <tr>
    <td colspan="2"><h2>USERLOGIN</h2></td>
    </tr>
    <tr>
    <td><label for="n1"><img src="user.svg" alt="" height="40px"></label></td>
    <td><input type="text" size="" id="n1" placeholder="Username" pattern="[a-zA-Z]+" title="Only Alphabets"></td>
    </tr>
    <tr>
    <td><label for="n2"><img src="pass.svg" alt="" height="40px"></label></td>
    <td><input type="password" id="n2"   placeholder="Password" pattern="[a-zA-Z0-9]{5,}" title="alphanumerics are allowed"></td>
    </tr>
    <tr>
       
    <td colspan="2" style="text-align:center"><input type="submit" id="b1"value="Login"></td>
    </tr>
    </table>
</body>
</html>
